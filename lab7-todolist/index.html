<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reactive Todo List</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/rxjs@7.8.1/dist/bundles/rxjs.umd.min.js"></script>
  <script src="./assets/js/main.js" type="module"></script>
</head>

<body>
  <div class="container">
    <p class="work-label">ЛАБОРАТОРНА РОБОТА № 7</p>
    <h1> Todo List</h1>
    <a href="../index.html" class="btn-back">На головну</a>

    <div class="todo-app">
      <div class="input-section">
        <h2>Нова задача</h2>
        <form id="todoForm" class="input-group">
          <input type="text" id="todoInput" placeholder="Наприклад: Виконати лабораторну">
          <button id="addBtn" type="submit">Додати</button>
        </form>

        <div id="filterButtons" class="filters">
          <button data-filter="all" class="active">Усі</button>
          <button data-filter="active">Активні</button>
          <button data-filter="completed">Виконані</button>
        </div>

        <div id="metaInfo" class="stats">
          Всього: 0 | Активні: 0 | Виконані: 0
        </div>
      </div>

      <div class="list-section">
        <h2>Список задач</h2>
        <ul id="todoList"></ul>
      </div>
    </div>
  </div>
</body>

</html>
