<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reactive Todo List</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>Reactive Todo List</h1>
    <a href="../index.html" class="btn-back">На головну</a>

    <div class="todo-app">
      <div class="input-section">
        <h2>Нова задача</h2>
        <div class="input-group">
          <input type="text" id="todoInput" placeholder="Наприклад: Виконати лабораторну">
          <button id="addBtn" type="button">Додати</button>
        </div>

        <div class="filters">
          <button id="filterAll" class="active">Усі</button>
          <button id="filterActive">Активні</button>
          <button id="filterCompleted">Виконані</button>
        </div>

        <div class="stats">
          Всього: <span id="totalCount">0</span> |
          Активні: <span id="activeCount">0</span> |
          Виконані: <span id="completedCount">0</span>
        </div>
      </div>

      <div class="list-section">
        <h2>Список задач</h2>
        <ul id="todoList"></ul>
      </div>
    </div>
  </div>

  <script src="dist/index.js" type="module"></script>
</body>

</html>
